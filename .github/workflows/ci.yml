name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

# Cancela runs viejos del mismo branch/PR cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (con cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Android Lint
        run: ./gradlew lintDebug

      - name: Unit tests (JVM) — ViewModels + casos de uso
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qless-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload reportes (lint + tests)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: app/build/reports/
          if-no-files-found: warn

  instrumented:
    name: Instrumented tests (emulador)
    runs-on: ubuntu-latest
    # Solo en PRs: el emulador tarda ~8 min y los push a dev ya tienen feedback
    # rápido (lint + unit + build). Quitá este 'if' para correrlo en cada push.
    if: github.event_name == 'pull_request'
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (con cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Habilita aceleración por hardware (KVM) para que el emulador no vaya a paso de tortuga.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Instrumented tests (connectedDebugAndroidTest)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest

      - name: Upload reportes androidTest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: androidtest-reports
          path: app/build/reports/androidTests/
          if-no-files-found: warn
